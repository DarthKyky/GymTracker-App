version: '3.9'

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: gymtracker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gymtracker}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-gymtracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gymnet

  # Node.js backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymtracker_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-gymtracker}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gymnet

  # React frontend (built to static, served via nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gymtracker_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - gymnet

  # Nginx reverse proxy (public entry point)
  nginx:
    image: nginx:1.25-alpine
    container_name: gymtracker_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - gymnet

volumes:
  pgdata:

networks:
  gymnet:
    driver: bridge
